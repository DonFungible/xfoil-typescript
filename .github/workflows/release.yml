name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: win32-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran make binutils
      - name: Install macOS toolchain
        if: runner.os == 'macOS'
        run: |
          brew install gcc
          gfortran_path="$(brew --prefix gcc)/bin/gfortran"
          if [ ! -x "$gfortran_path" ]; then
            gfortran_path="$(brew --prefix gcc)/bin/gfortran-15"
          fi
          echo "FC=$gfortran_path" >> "$GITHUB_ENV"
          "$gfortran_path" --version
      - name: Install Windows toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-binutils
            tar
      - name: Build and stage binary
        if: runner.os != 'Windows'
        shell: bash
        run: node scripts/build-xfoil-binary.mjs --target "${{ matrix.target }}"
      - name: Build and stage binary
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          MAKE: mingw32-make
        run: node scripts/build-xfoil-binary.mjs --target "${{ matrix.target }}"
      - name: Verify staged binary package
        run: node scripts/verify-binary-packages.mjs --target "${{ matrix.target }}"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build wrapper
        run: pnpm --filter xfoil build
      - name: Run integration tests
        env:
          XFOIL_BINARY_PATH: ${{ github.workspace }}/packages/binaries/${{ matrix.target }}/${{ startsWith(matrix.target, 'win32') && 'xfoil.exe' || 'xfoil' }}
        run: pnpm --filter xfoil test:integration
      - name: Packed install smoke
        run: pnpm smoke:packed-install -- --target "${{ matrix.target }}"
      - uses: actions/upload-artifact@v5
        with:
          name: xfoil-${{ matrix.target }}
          path: packages/binaries/${{ matrix.target }}

  release:
    name: Version or publish
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v5
        with:
          name: xfoil-linux-x64
          path: packages/binaries/linux-x64
      - uses: actions/download-artifact@v5
        with:
          name: xfoil-linux-arm64
          path: packages/binaries/linux-arm64
      - uses: actions/download-artifact@v5
        with:
          name: xfoil-darwin-arm64
          path: packages/binaries/darwin-arm64
      - uses: actions/download-artifact@v5
        with:
          name: xfoil-darwin-x64
          path: packages/binaries/darwin-x64
      - uses: actions/download-artifact@v5
        with:
          name: xfoil-win32-x64
          path: packages/binaries/win32-x64
      - name: Restore executable modes
        run: find packages/binaries -maxdepth 2 -type f \( -name 'xfoil' -o -name 'xfoil.exe' \) -exec chmod 755 {} \;
      - run: pnpm verify:binary-packages
      - run: pnpm check
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  post-publish-smoke:
    name: Published smoke ${{ matrix.target }}
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: win32-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/smoke-published-install.mjs --target "${{ matrix.target }}"
